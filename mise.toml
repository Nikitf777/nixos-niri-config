[env]
SUDO_ASKPASS = './askpass.sh'

[tasks.build]
run = 'nixos-rebuild build --flake .#nixos'

[tasks.b]
run = 'mise build'

[tasks.test-desktop]
run = './rebuild.sh test desktop'

[tasks.test-gaming]
run = './rebuild.sh test gaming'

[tasks.test-server]
run = './rebuild.sh test server'

[tasks.td]
run = 'mise test-desktop'

[tasks.tg]
run = 'mise test-gaming'

[tasks.ts]
run = 'mise test-server'

[tasks.switch-desktop]
run = './rebuild.sh switch desktop'

[tasks.switch-gaming]
run = './rebuild.sh switch gaming'

[tasks.switch-server]
run = './rebuild.sh switch server'

[tasks.sd]
run = 'mise switch-desktop'

[tasks.sg]
run = 'mise switch-gaming'

[tasks.ss]
run = 'mise switch-server'

[tasks.boot]
run = 'sudo -A nixos-rebuild boot --flake .#nixos'

[tasks.boot-desktop]
run = './rebuild.sh boot desktop'

[tasks.boot-gaming]
run = './rebuild.sh boot gaming'

[tasks.boot-server]
run = './rebuild.sh boot server'

[tasks.bd]
run = 'mise boot-desktop'

[tasks.bg]
run = 'mise boot-gaming'

[tasks.bs]
run = 'mise boot-server'
