[env]
SUDO_ASKPASS = './askpass.nu'

[tasks.build]
run = './rebuild build'

[tasks.b]
run = 'mise build'

[tasks.switch-home]
run = 'home-manager switch --flake ./#user'

[tasks.hs] # sh is already taken
run = 'mise switch-home'

[tasks.test-desktop]
run = './rebuild-spec.nu test desktop'

[tasks.test-gaming]
run = './rebuild-spec.nu test gaming'

[tasks.test-server]
run = './rebuild-spec.nu test server'

[tasks.td]
run = 'mise test-desktop'

[tasks.tg]
run = 'mise test-gaming'

[tasks.ts]
run = 'mise test-server'

[tasks.switch]
run = 'sudo -A ./rebuild.nu switch'

[tasks.switch-desktop]
run = './rebuild-spec.nu switch desktop'

[tasks.switch-gaming]
run = './rebuild-spec.nu switch gaming'

[tasks.switch-server]
run = './rebuild-spec.nu switch server'

[tasks.sd]
run = 'mise switch-desktop'

[tasks.sg]
run = 'mise switch-gaming'

[tasks.ss]
run = 'mise switch-server'

[tasks.boot]
run = 'sudo -A ./rebuild boot'
